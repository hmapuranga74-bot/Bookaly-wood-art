<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Bookaly Furniture</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{

  --ink:#0d0d0d;--sky:#0ea5e9;--skydeep:#0369a1;
  --cream:#fafaf8;--mist:#f1f5f9;--mid:#64748b;
  --serif:'Cormorant Garamond',serif;
  --sans:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);overflow-x:hidden;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 5vw;background:rgba(250,250,248,0.92);
  backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,0.06);
}
.nav-logo{height:48px;object-fit:contain;}
.nav-right{display:flex;align-items:center;gap:24px;}
.nav-links{display:flex;gap:20px;list-style:none;}
.nav-links a{font-size:13px;font-weight:500;color:var(--mid);text-decoration:none;letter-spacing:.5px;transition:color .2s;}
.nav-links a:hover{color:var(--sky);}
.cart-btn{
  display:flex;align-items:center;gap:8px;
  background:var(--ink);color:#fff;border:none;
  padding:9px 18px;border-radius:100px;font-size:13px;
  font-weight:600;cursor:pointer;font-family:var(--sans);
  transition:background .2s,transform .15s;
}
.cart-btn:hover{background:var(--sky);transform:translateY(-1px);}
.cart-count{
  background:var(--sky);color:#fff;border-radius:50%;
  width:18px;height:18px;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;
}

/* HERO */
.hero{
  min-height:100vh;display:grid;grid-template-columns:1fr 1fr;
  padding:120px 5vw 60px;gap:60px;align-items:center;
}
.hero-text{animation:fadeUp .8s ease both;}
.hero-eyebrow{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--sky);font-weight:600;margin-bottom:20px;
}
.hero-title{
  font-family:var(--serif);font-size:clamp(42px,5vw,72px);
  line-height:1.05;font-weight:700;margin-bottom:20px;
}
.hero-title span{color:var(--sky);}
.hero-sub{font-size:15px;color:var(--mid);line-height:1.7;max-width:420px;margin-bottom:36px;}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
.btn-dark{
  background:var(--ink);color:#fff;padding:13px 28px;
  border-radius:100px;font-size:14px;font-weight:600;
  text-decoration:none;border:none;cursor:pointer;
  font-family:var(--sans);transition:background .2s,transform .15s;display:inline-block;
}
.btn-dark:hover{background:var(--sky);transform:translateY(-2px);}
.btn-outline{
  background:transparent;color:var(--ink);padding:13px 28px;
  border-radius:100px;font-size:14px;font-weight:600;
  text-decoration:none;border:2px solid var(--ink);cursor:pointer;
  font-family:var(--sans);transition:all .2s;display:inline-block;
}
.btn-outline:hover{border-color:var(--sky);color:var(--sky);}
.hero-imgs{
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:200px 200px;
  gap:10px;animation:fadeUp .8s .2s ease both;
}
.hero-img-main{grid-row:1/3;border-radius:16px;overflow:hidden;}
.hero-img-sm{border-radius:12px;overflow:hidden;}
.hero-imgs img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.hero-imgs img:hover{transform:scale(1.04);}

/* STATS */
.stats{
  display:flex;justify-content:center;gap:0;
  background:var(--ink);color:#fff;padding:0;
}
.stat{
  padding:28px 48px;text-align:center;
  border-right:1px solid rgba(255,255,255,0.1);
}
.stat:last-child{border-right:none;}
.stat-num{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--sky);}
.stat-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-top:4px;}

/* SECTION HEADER */
.section{padding:80px 5vw;}
.section-header{text-align:center;margin-bottom:48px;}
.section-eye{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--sky);font-weight:600;margin-bottom:12px;}
.section-title{font-family:var(--serif);font-size:clamp(32px,4vw,52px);font-weight:700;}

/* GALLERY */
.gallery-bg{background:var(--mist);}
.gallery-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  grid-template-rows:180px 180px;gap:8px;
}
.gallery-grid .g0{grid-column:1/3;grid-row:1/3;}
.gallery-grid .g3{grid-column:4/6;}
.gallery-item{overflow:hidden;border-radius:12px;cursor:pointer;position:relative;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.gallery-item:hover img{transform:scale(1.06);}
.gallery-item::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0);transition:background .3s;
}
.gallery-item:hover::after{background:rgba(14,165,233,0.15);}

/* PRODUCTS */
.filter-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.filter-btn{
  padding:8px 20px;border-radius:100px;font-size:13px;
  font-weight:500;border:1.5px solid #e2e8f0;background:#fff;
  cursor:pointer;font-family:var(--sans);transition:all .2s;color:var(--mid);
}
.filter-btn.active,.filter-btn:hover{background:var(--sky);color:#fff;border-color:var(--sky);}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;}
.product-card{
  background:#fff;border-radius:16px;overflow:hidden;
  border:1px solid #f1f5f9;transition:transform .3s,box-shadow .3s;
}
.product-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,0.1);}
.product-img{height:220px;overflow:hidden;position:relative;}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.product-card:hover .product-img img{transform:scale(1.05);}
.product-cat{
  position:absolute;top:12px;left:12px;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:100px;font-weight:600;color:var(--skydeep);
}
.product-body{padding:18px;}
.product-name{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:6px;}
.product-desc{font-size:13px;color:var(--mid);line-height:1.6;margin-bottom:14px;}
.product-footer{display:flex;align-items:center;justify-content:space-between;}
.product-price{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--sky);}
.add-btn{
  background:var(--ink);color:#fff;border:none;
  padding:9px 18px;border-radius:100px;font-size:12px;
  font-weight:600;cursor:pointer;font-family:var(--sans);
  transition:background .2s;
}
.add-btn:hover{background:var(--sky);}
.add-btn.added{background:var(--sky);}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.about-img-stack{position:relative;height:420px;}
.about-img-stack img:first-child{
  width:70%;height:300px;object-fit:cover;
  border-radius:16px;position:absolute;top:0;left:0;
}
.about-img-stack img:last-child{
  width:60%;height:240px;object-fit:cover;
  border-radius:16px;position:absolute;bottom:0;right:0;
  border:6px solid var(--cream);
}
.about-text{}
.about-title{font-family:var(--serif);font-size:clamp(28px,3vw,44px);font-weight:700;margin-bottom:20px;line-height:1.15;}
.about-body{color:var(--mid);line-height:1.8;font-size:15px;margin-bottom:24px;}
.contact-items{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.contact-item{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--mid);}
.contact-item a{color:var(--ink);text-decoration:none;font-weight:500;}
.contact-item a:hover{color:var(--sky);}

/* WA BUTTON */
.wa-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#25d366;color:#fff;padding:13px 28px;
  border-radius:100px;font-size:14px;font-weight:600;
  text-decoration:none;transition:background .2s,transform .15s;
}
.wa-btn:hover{background:#1ebe5d;transform:translateY(-2px);}

/* FOOTER */
footer{
  background:var(--ink);color:#fff;
  padding:40px 5vw;display:flex;
  align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;
}
.footer-logo{height:36px;object-fit:contain;opacity:.8;}
.footer-text{font-size:12px;opacity:.4;text-align:right;}

/* CART DRAWER */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.drawer-overlay.open{opacity:1;pointer-events:all;}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:100%;max-width:420px;
  background:#fff;z-index:201;padding:28px;overflow-y:auto;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.drawer.open{transform:translateX(0);}
.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}
.drawer-title{font-family:var(--serif);font-size:26px;font-weight:700;}
.close-btn{background:none;border:none;font-size:28px;cursor:pointer;color:var(--mid);line-height:1;}
.close-btn:hover{color:var(--ink);}
.cart-empty{text-align:center;padding:60px 0;color:var(--mid);}
.cart-empty-icon{font-size:48px;margin-bottom:12px;}
.cart-items{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.cart-item{display:flex;gap:12px;background:var(--mist);border-radius:12px;padding:12px;}
.cart-item-img{width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-price{font-size:13px;color:var(--sky);font-weight:600;}
.qty-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{
  width:24px;height:24px;border-radius:6px;background:#e2e8f0;
  border:none;cursor:pointer;font-size:16px;line-height:1;
  display:flex;align-items:center;justify-content:center;
}
.qty-btn:hover{background:var(--sky);color:#fff;}
.qty-num{font-size:13px;font-weight:600;min-width:16px;text-align:center;}
.cart-item-total{font-weight:700;font-size:14px;align-self:center;}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid #f1f5f9;margin-bottom:16px;}
.cart-total-label{font-size:15px;font-weight:500;}
.cart-total-val{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--sky);}
.form-group{margin-bottom:10px;}
.form-input{
  width:100%;border:1.5px solid #e2e8f0;border-radius:10px;
  padding:11px 14px;font-size:14px;font-family:var(--sans);
  outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--sky);}
.pdf-btn{
  width:100%;background:var(--ink);color:#fff;border:none;
  padding:14px;border-radius:12px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--sans);margin-top:4px;
  transition:background .2s;
}
.pdf-btn:hover{background:var(--sky);}
.form-hint{font-size:11px;color:var(--mid);text-align:center;margin-top:8px;}

/* LIGHTBOX */
.lightbox{
  position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-height:85vh;max-width:85vw;border-radius:12px;object-fit:contain;}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:36px;cursor:pointer;background:none;border:none;line-height:1;}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:48px;cursor:pointer;background:none;border:none;padding:0 16px;opacity:.7;transition:opacity .2s;}
.lb-nav:hover{opacity:1;}
.lb-prev{left:0;} .lb-next{right:0;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

/* MOBILE */
@media(max-width:768px){
  .hero{grid-template-columns:1fr;padding:100px 5vw 40px;}
  .hero-imgs{display:none;}
  .stats{flex-wrap:wrap;}
  .stat{flex:1;min-width:33%;}
  .about-grid{grid-template-columns:1fr;}
  .about-img-stack{height:260px;}
  .gallery-grid{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,130px);}
  .gallery-grid .g0{grid-column:1/2;grid-row:1/2;}
  .gallery-grid .g3{grid-column:1/2;grid-row:1/2;}
  footer{flex-direction:column;text-align:center;}
  .footer-text{text-align:center;}
  .nav-links{display:none;}
}
</style>
</head>
